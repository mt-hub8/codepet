name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag（例如 v1.0.0-beta.1）"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Windows installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: CodePet ${{ github.event.inputs.tag || github.ref_name }} Public Beta
          releaseBody: |
            # CodePet v1.0.0-beta.1 Public Beta

            **CodePet** 是一个本地优先的 AI 桌面伙伴，用桌宠提醒用户处理提醒、任务、休息、本地 AI 和 Coding Agent 状态。

            默认不上传你的代码、命令日志、聊天、提醒、宠物素材与基础记忆。

            ### 下载（Windows）
            - **推荐**：`.msi` 安装包（WiX）
            - **备选**：`*-setup.exe`（NSIS 安装程序）

            macOS / Linux 安装包暂未正式提供。

            ### 主要功能
            - 桌宠悬浮窗口
            - 本地提醒与自定义提示音
            - Ollama 本地 AI（可选）
            - 命令任务监控
            - Codex / Cursor / Claude Code 轻量接管提醒
            - 等待确认检测与长时间无输出检测
            - 宠物素材导入与孵化提示词向导
            - 工作状态中心与基础行为记忆
            - 首次启动引导与依赖诊断

            ### 安装提示
            - 当前为 **Public Beta**，**未代码签名**，Windows 可能提示未知发布者 →「更多信息」→「仍要运行」
            - 请仅从本项目 GitHub Releases 下载

            ### 隐私
            默认本地运行。远程 Ollama 与外部 Agent 工具有各自数据策略。详见 [docs/privacy.md](https://github.com/${{ github.repository }}/blob/main/docs/privacy.md)。

            ### 已知问题
            见 [docs/known-issues.md](https://github.com/${{ github.repository }}/blob/main/docs/known-issues.md)。

            ### 反馈
            - [Bug 报告](https://github.com/${{ github.repository }}/issues/new?template=bug_report.yml)
            - [功能建议](https://github.com/${{ github.repository }}/issues/new?template=feature_request.yml)
            - [宠物素材问题](https://github.com/${{ github.repository }}/issues/new?template=pet_asset_issue.yml)

            完整变更见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)。
          releaseDraft: true
          prerelease: true
          args: ""
